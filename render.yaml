services:
  - type: web
    name: ai-career-guidance
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
